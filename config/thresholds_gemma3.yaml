thresholds:
  healthy_dos_min: 14
  watch_dos_min: 7
  critical_dos_max: 7
  overstock_dos_min: 60

defaults:
  safety_stock: 0
  lead_time_days: 7

cache:
  ttl_graph_seconds: 86400
  ttl_rules_seconds: 3600
  ttl_metrics_seconds: 1800
  max_size_mb: 500

ollama:
  base_url: "http://localhost:11434"
  model: "gemma3:4b"
  temperature: 0.1
  timeout_ms: 120000
  num_predict: 1200

output:
  format: "json"
  pretty_print: true

agent:
  mode: "deterministic"
  max_steps: 3
